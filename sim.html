<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanSync 用户场景模拟</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  .header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 18px 32px; display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 18px; font-weight: 700; color: #7c83ff; letter-spacing: -0.3px; }
  .subtitle { font-size: 13px; color: #64748b; }

  .layout { display: grid; grid-template-columns: 300px 1fr; gap: 0; min-height: calc(100vh - 61px); }

  .sidebar { background: #1a1d27; border-right: 1px solid #2d3148; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .sidebar h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }

  .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  .field input { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: #7c83ff; }

  .scenario-list { display: flex; flex-direction: column; gap: 4px; }
  .scenario-btn { background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 10px 12px; cursor: pointer; text-align: left; color: #94a3b8; font-size: 12px; transition: all 0.15s; }
  .scenario-btn:hover { border-color: #7c83ff; color: #e2e8f0; }
  .scenario-btn.active { border-color: #7c83ff; background: #1e1f35; color: #a5b4fc; }
  .scenario-btn .title { font-weight: 600; color: inherit; margin-bottom: 2px; }
  .scenario-btn .desc { font-size: 11px; opacity: 0.7; }

  .run-btn { background: #7c83ff; color: #fff; border: none; border-radius: 8px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; width: 100%; }
  .run-btn:hover:not(:disabled) { background: #6366f1; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .clear-btn { background: transparent; color: #64748b; border: 1px solid #2d3148; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all 0.15s; width: 100%; }
  .clear-btn:hover { border-color: #475569; color: #94a3b8; }

  .main { padding: 24px 28px; overflow-y: auto; }
  .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .main-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .status-bar { font-size: 12px; color: #64748b; }

  .steps { display: flex; flex-direction: column; gap: 8px; }

  .step { background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
  .step.pass { border-color: #1a4731; }
  .step.fail { border-color: #4c1d1d; }
  .step.warn { border-color: #4a3600; }
  .step.running { border-color: #2d3148; animation: pulse 1.5s infinite; }

  @keyframes pulse { 0%,100% { border-color: #2d3148; } 50% { border-color: #7c83ff; } }

  .step-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
  .step-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .step-icon.pending { background: #1e293b; color: #475569; }
  .step-icon.running { background: #1e2a4a; color: #7c83ff; }
  .step-icon.pass { background: #14422e; color: #4ade80; }
  .step-icon.fail { background: #4c1d1d; color: #f87171; }
  .step-icon.warn { background: #422b00; color: #fbbf24; }

  .step-name { font-size: 13px; font-weight: 600; flex: 1; }
  .step-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .badge-pass { background: #14422e; color: #4ade80; }
  .badge-fail { background: #4c1d1d; color: #f87171; }
  .badge-warn { background: #422b00; color: #fbbf24; }
  .badge-skip { background: #1e293b; color: #64748b; }

  .step-time { font-size: 11px; color: #475569; }

  .step-detail { border-top: 1px solid #2d3148; padding: 0 14px; max-height: 0; overflow: hidden; transition: max-height 0.2s, padding 0.2s; }
  .step-detail.open { max-height: 500px; padding: 12px 14px; }

  .step-desc { font-size: 12px; color: #64748b; margin-bottom: 8px; }
  .step-result { font-size: 12px; }
  .step-result .label { color: #64748b; margin-right: 6px; }
  .step-result .value { color: #94a3b8; }
  .step-result.ok .value { color: #4ade80; }
  .step-result.err .value { color: #f87171; }
  .step-result.info .value { color: #60a5fa; }

  .req-block { background: #0f1117; border: 1px solid #1e293b; border-radius: 6px; padding: 10px 12px; margin-top: 8px; font-family: 'Courier New', monospace; font-size: 11px; color: #64748b; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; }
  .req-block .method { color: #7c83ff; }
  .req-block .url { color: #60a5fa; }
  .req-block .status-ok { color: #4ade80; }
  .req-block .status-err { color: #f87171; }
  .req-block .status-warn { color: #fbbf24; }

  .summary { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 24px; align-items: center; }
  .summary-stat { text-align: center; }
  .summary-num { font-size: 24px; font-weight: 700; }
  .summary-num.pass { color: #4ade80; }
  .summary-num.fail { color: #f87171; }
  .summary-num.warn { color: #fbbf24; }
  .summary-label { font-size: 11px; color: #64748b; margin-top: 2px; }
  .summary-divider { width: 1px; height: 40px; background: #2d3148; }
  .summary-msg { flex: 1; font-size: 13px; color: #94a3b8; }
  .summary-msg strong { color: #e2e8f0; }

  .empty { text-align: center; padding: 60px 20px; color: #475569; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
  .empty-hint { font-size: 12px; margin-top: 6px; color: #374151; }

  .progress { height: 2px; background: #1e293b; border-radius: 1px; margin: 12px 0; overflow: hidden; }
  .progress-bar { height: 100%; background: #7c83ff; transition: width 0.3s; border-radius: 1px; }

  .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
  .tag-new { background: #1e2a4a; color: #60a5fa; }
  .tag-key { background: #14422e; color: #4ade80; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PlanSync</div>
  <div class="subtitle">用户场景模拟测试 · 验证核心工作流</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div>
      <h3>连接配置</h3>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">
        <div class="field">
          <label>API 地址</label>
          <input id="baseUrl" value="http://localhost:3001" placeholder="http://localhost:3001">
        </div>
        <div class="field">
          <label>Token (PLANSYNC_SECRET)</label>
          <input id="token" value="dev-secret" placeholder="dev-secret">
        </div>
        <div class="field">
          <label>用户名</label>
          <input id="userName" value="sim-user" placeholder="sim-user">
        </div>
      </div>
    </div>

    <div>
      <h3>选择场景</h3>
      <div class="scenario-list" style="margin-top:10px" id="scenarioList"></div>
    </div>

    <div style="margin-top:auto;display:flex;flex-direction:column;gap:8px">
      <button class="run-btn" id="runBtn" onclick="runSimulation()">▶ 运行模拟</button>
      <button class="clear-btn" onclick="clearResults()">清空结果</button>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="main-title" id="mainTitle">选择场景并运行</div>
      <div class="status-bar" id="statusBar"></div>
    </div>
    <div id="summaryArea"></div>
    <div id="progressArea" style="display:none">
      <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>
    <div id="stepsArea"><div class="empty"><div class="empty-icon">🧪</div><div class="empty-text">尚未运行测试</div><div class="empty-hint">在左侧选择场景，点击"运行模拟"开始</div></div></div>
  </div>
</div>

<script>
// ─── 场景定义 ─────────────────────────────────────────
const SCENARIOS = [
  {
    id: 'core',
    title: '核心闭环',
    desc: 'drift 检测 → 阻断 → 解决 → 继续',
    steps: 'core'
  },
  {
    id: 'happy',
    title: '无 drift 正常流',
    desc: '创建项目 → 任务 → 执行 → 完成',
    steps: 'happy'
  },
  {
    id: 'full',
    title: '完整工作流',
    desc: '包含所有场景的端到端验证',
    steps: 'full'
  }
];

let selectedScenario = 'core';
let running = false;
let stepResults = [];

// ─── 初始化 ──────────────────────────────────────────
function init() {
  const list = document.getElementById('scenarioList');
  SCENARIOS.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'scenario-btn' + (s.id === selectedScenario ? ' active' : '');
    btn.innerHTML = `<div class="title">${s.title}</div><div class="desc">${s.desc}</div>`;
    btn.onclick = () => {
      selectedScenario = s.id;
      document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      clearResults();
      document.getElementById('mainTitle').textContent = s.title + ' — ' + s.desc;
    };
    list.appendChild(btn);
  });
  document.getElementById('mainTitle').textContent = SCENARIOS[0].title + ' — ' + SCENARIOS[0].desc;
}

// ─── API 客户端 ─────────────────────────────────────
function getConfig() {
  return {
    baseUrl: document.getElementById('baseUrl').value.replace(/\/$/, ''),
    token: document.getElementById('token').value,
    userName: document.getElementById('userName').value,
  };
}

async function api(method, path, body) {
  const { baseUrl, token, userName } = getConfig();
  const start = Date.now();
  let status, json, error;
  try {
    const res = await fetch(baseUrl + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        'X-User-Name': userName,
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    status = res.status;
    try { json = await res.json(); } catch { json = {}; }
  } catch (e) {
    error = e.message;
    status = 0;
    json = {};
  }
  return { status, json, error, ms: Date.now() - start };
}

// ─── 步骤渲染 ─────────────────────────────────────────
function addStep(name, desc) {
  const idx = stepResults.length;
  stepResults.push({ name, desc, state: 'pending', result: null });

  const stepsArea = document.getElementById('stepsArea');
  if (stepsArea.querySelector('.empty')) stepsArea.innerHTML = '';

  const el = document.createElement('div');
  el.className = 'step';
  el.id = `step-${idx}`;
  el.innerHTML = `
    <div class="step-header" onclick="toggleDetail(${idx})">
      <div class="step-icon pending" id="icon-${idx}">·</div>
      <div class="step-name">${name}</div>
      <span class="step-badge badge-skip" id="badge-${idx}">待运行</span>
      <span class="step-time" id="time-${idx}"></span>
    </div>
    <div class="step-detail" id="detail-${idx}">
      <div class="step-desc">${desc}</div>
      <div id="result-${idx}"></div>
    </div>`;
  stepsArea.appendChild(el);
  return idx;
}

function setStepRunning(idx) {
  stepResults[idx].state = 'running';
  document.getElementById(`step-${idx}`).className = 'step running';
  document.getElementById(`icon-${idx}`).className = 'step-icon running';
  document.getElementById(`icon-${idx}`).textContent = '↻';
  document.getElementById(`badge-${idx}`).className = 'step-badge';
  document.getElementById(`badge-${idx}`).textContent = '运行中...';
  document.getElementById(`detail-${idx}`).classList.add('open');
}

function setStepDone(idx, state, badge, req, resultLines, ms) {
  stepResults[idx].state = state;
  const stateMap = { pass: ['pass','badge-pass','✓'], fail: ['fail','badge-fail','✗'], warn: ['warn','badge-warn','⚠'] };
  const [cls, badgeCls, icon] = stateMap[state];
  document.getElementById(`step-${idx}`).className = `step ${cls}`;
  document.getElementById(`icon-${idx}`).className = `step-icon ${cls}`;
  document.getElementById(`icon-${idx}`).textContent = icon;
  document.getElementById(`badge-${idx}`).className = `step-badge ${badgeCls}`;
  document.getElementById(`badge-${idx}`).textContent = badge;
  if (ms) document.getElementById(`time-${idx}`).textContent = `${ms}ms`;

  const resultEl = document.getElementById(`result-${idx}`);
  let html = '';
  if (resultLines) {
    resultLines.forEach(r => {
      html += `<div class="step-result ${r.type||''}"><span class="label">${r.label}</span><span class="value">${r.value}</span></div>`;
    });
  }
  if (req) {
    html += `<div class="req-block">${req}</div>`;
  }
  resultEl.innerHTML = html;
}

function toggleDetail(idx) {
  const d = document.getElementById(`detail-${idx}`);
  d.classList.toggle('open');
}

function updateProgress(done, total) {
  document.getElementById('progressBar').style.width = `${Math.round(done/total*100)}%`;
  document.getElementById('statusBar').textContent = `${done} / ${total} 步`;
}

function showSummary(pass, fail, warn, msg) {
  document.getElementById('summaryArea').innerHTML = `
    <div class="summary">
      <div class="summary-stat"><div class="summary-num pass">${pass}</div><div class="summary-label">通过</div></div>
      <div class="summary-divider"></div>
      <div class="summary-stat"><div class="summary-num warn">${warn}</div><div class="summary-label">警告</div></div>
      <div class="summary-divider"></div>
      <div class="summary-stat"><div class="summary-num fail">${fail}</div><div class="summary-label">失败</div></div>
      <div class="summary-divider"></div>
      <div class="summary-msg">${msg}</div>
    </div>`;
}

function clearResults() {
  stepResults = [];
  document.getElementById('stepsArea').innerHTML = '<div class="empty"><div class="empty-icon">🧪</div><div class="empty-text">尚未运行测试</div><div class="empty-hint">在左侧选择场景，点击"运行模拟"开始</div></div>';
  document.getElementById('summaryArea').innerHTML = '';
  document.getElementById('progressArea').style.display = 'none';
  document.getElementById('statusBar').textContent = '';
}

function fmtReq(method, path, status, body, respSnippet) {
  const statusCls = status >= 200 && status < 300 ? 'status-ok' : status === 409 ? 'status-warn' : 'status-err';
  let out = `<span class="method">${method}</span> <span class="url">${path}</span>  <span class="${statusCls}">→ ${status}</span>`;
  if (body) out += `\n\nRequest: ${JSON.stringify(body, null, 2)}`;
  if (respSnippet) out += `\n\nResponse: ${respSnippet}`;
  return out;
}

// ─── 主模拟逻辑 ───────────────────────────────────────
async function runSimulation() {
  if (running) return;
  running = true;
  clearResults();
  document.getElementById('runBtn').disabled = true;
  document.getElementById('progressArea').style.display = 'block';

  const cfg = getConfig();
  const ctx = { projectId: null, planV1Id: null, planV2Id: null, taskId: null, driftId: null, runId: null };
  let pass = 0, fail = 0, warn = 0;

  const allSteps = getSteps(selectedScenario, ctx, cfg.userName);
  const total = allSteps.length;

  // Register all steps first (shows them as pending)
  allSteps.forEach(s => addStep(s.name, s.desc));
  updateProgress(0, total);

  // Execute each step
  for (let i = 0; i < allSteps.length; i++) {
    const s = allSteps[i];
    setStepRunning(i);
    updateProgress(i, total);

    try {
      const r = await s.run(ctx);
      const state = r.state || 'pass';
      if (state === 'pass') pass++;
      else if (state === 'fail') fail++;
      else warn++;

      setStepDone(i, state, r.badge || (state === 'pass' ? '通过' : state === 'fail' ? '失败' : '警告'),
        r.req, r.results, r.ms);

      if (state === 'fail' && s.critical !== false) {
        // Mark remaining as skipped
        for (let j = i+1; j < allSteps.length; j++) {
          document.getElementById(`badge-${j}`).textContent = '已跳过';
        }
        fail += allSteps.length - i - 1;
        break;
      }
    } catch (e) {
      fail++;
      setStepDone(i, 'fail', '异常', null, [{ label: '错误', value: e.message, type: 'err' }]);
      break;
    }
  }

  updateProgress(total, total);
  const total2 = pass + fail + warn;
  const allPass = fail === 0;
  showSummary(pass, fail, warn,
    allPass
      ? `<strong>✓ 所有测试通过</strong> — 核心工作流运行正常，drift 阻断机制有效`
      : `<strong>发现 ${fail} 个问题</strong> — 请查看失败步骤的详情，检查服务器是否正在运行`
  );

  running = false;
  document.getElementById('runBtn').disabled = false;
}

// ─── 场景步骤定义 ─────────────────────────────────────
function getSteps(scenario, ctx, userName) {
  const steps = [];

  // ── 公共步骤：创建项目 + v1 计划 ─────────────────
  const projectName = `SIM-${Date.now()}`;

  steps.push({
    name: '连通性检查',
    desc: '验证 API 服务器是否可达（GET /api/health）',
    async run() {
      const r = await api('GET', '/api/health');
      if (r.status === 200 || r.status === 204) {
        return { state: 'pass', badge: '在线', ms: r.ms, results: [{ label: '状态', value: 'HTTP ' + r.status, type: 'ok' }] };
      }
      if (r.error) return { state: 'fail', badge: '无法连接', ms: r.ms, results: [{ label: '错误', value: r.error, type: 'err' }] };
      return { state: 'warn', badge: 'HTTP ' + r.status, ms: r.ms, results: [{ label: '响应', value: 'HTTP ' + r.status }] };
    }
  });

  steps.push({
    name: '创建测试项目',
    desc: `POST /api/projects — 创建名为 "${projectName}" 的隔离测试项目`,
    async run(ctx) {
      const body = { name: projectName, description: '模拟测试自动创建，可安全删除' };
      const r = await api('POST', '/api/projects', body);
      if (r.status !== 201) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
        req: fmtReq('POST', '/api/projects', r.status, body, JSON.stringify(r.json?.error)),
        results: [{ label: '错误', value: r.json?.error?.message || r.error || 'unknown', type: 'err' }]
      };
      ctx.projectId = r.json.data.id;
      return { state: 'pass', ms: r.ms,
        req: fmtReq('POST', '/api/projects', r.status, body, `{ id: "${ctx.projectId}" }`),
        results: [{ label: '项目 ID', value: ctx.projectId, type: 'info' }]
      };
    }
  });

  steps.push({
    name: '创建计划 v1',
    desc: 'POST /api/projects/:id/plans — 创建初始版本计划（状态 draft）',
    async run(ctx) {
      const body = { title: '初始计划 v1', goal: '搭建核心 API 和基础 UI', scope: '后端 API + 前端 Dashboard', deliverables: ['实现登录 API', '完成 Dashboard 首页'] };
      const r = await api('POST', `/api/projects/${ctx.projectId}/plans`, body);
      if (r.status !== 201) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
        req: fmtReq('POST', `/api/projects/${ctx.projectId}/plans`, r.status, body, JSON.stringify(r.json?.error)),
        results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
      };
      ctx.planV1Id = r.json.data.id;
      return { state: 'pass', ms: r.ms,
        req: fmtReq('POST', `/api/projects/${ctx.projectId}/plans`, r.status, body, `{ id: "${ctx.planV1Id}", version: 1 }`),
        results: [{ label: '计划 ID', value: ctx.planV1Id, type: 'info' }, { label: '版本', value: 'v1' }]
      };
    }
  });

  steps.push({
    name: '激活计划 v1',
    desc: 'POST .../plans/:id/activate — 使 v1 进入 active 状态，任务可以绑定此版本',
    async run(ctx) {
      const r = await api('POST', `/api/projects/${ctx.projectId}/plans/${ctx.planV1Id}/activate`, {});
      if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
        req: fmtReq('POST', `…/plans/${ctx.planV1Id}/activate`, r.status, {}, JSON.stringify(r.json?.error)),
        results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
      };
      return { state: 'pass', ms: r.ms,
        req: fmtReq('POST', `…/plans/${ctx.planV1Id}/activate`, r.status, {}, `{ status: "active" }`),
        results: [{ label: '计划状态', value: 'active', type: 'ok' }]
      };
    }
  });

  steps.push({
    name: '创建任务（绑定 v1）',
    desc: 'POST /api/projects/:id/tasks — 创建任务，自动绑定当前 active 计划版本 v1',
    async run(ctx) {
      const body = { title: '实现用户登录 API', type: 'code', priority: 'p1', description: '包含鉴权、token 颁发、refresh 逻辑' };
      const r = await api('POST', `/api/projects/${ctx.projectId}/tasks`, body);
      if (r.status !== 201) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
        req: fmtReq('POST', `…/tasks`, r.status, body, JSON.stringify(r.json?.error)),
        results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
      };
      ctx.taskId = r.json.data.id;
      return { state: 'pass', ms: r.ms,
        req: fmtReq('POST', `…/tasks`, r.status, body, `{ id: "${ctx.taskId}", boundPlanVersion: 1 }`),
        results: [{ label: '任务 ID', value: ctx.taskId, type: 'info' }, { label: '绑定版本', value: 'v1' }]
      };
    }
  });

  // ── happy path：直接执行完成 ──────────────────────
  if (scenario === 'happy') {
    steps.push({
      name: '开始执行（无 drift）',
      desc: 'POST .../runs — 任务无 drift，应该直接允许（201）',
      async run(ctx) {
        const body = { executorType: 'human', executorName: userName };
        const r = await api('POST', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}/runs`, body);
        if (r.status !== 201) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/runs`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '期望', value: '201', type: 'err' }, { label: '实际', value: '' + r.status, type: 'err' }]
        };
        ctx.runId = r.json.data.id;
        return { state: 'pass', badge: '201 允许', ms: r.ms,
          req: fmtReq('POST', `…/runs`, r.status, body, `{ id: "${ctx.runId}", status: "running" }`),
          results: [{ label: '执行 ID', value: ctx.runId, type: 'info' }]
        };
      }
    });

    steps.push({
      name: '完成执行',
      desc: 'POST .../runs/:id?action=complete — 标记执行完成，提交交付物',
      async run(ctx) {
        const body = { status: 'completed', outputSummary: '登录 API 已实现并通过测试', deliverablesMet: ['实现登录 API', '完成 Dashboard 首页'] };
        const r = await api('POST', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}/runs/${ctx.runId}?action=complete`, body);
        if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/runs/${ctx.runId}?action=complete`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        return { state: 'pass', ms: r.ms,
          req: fmtReq('POST', `…/runs/${ctx.runId}?action=complete`, r.status, body, `{ status: "completed" }`),
          results: [{ label: '执行状态', value: 'completed', type: 'ok' }]
        };
      }
    });

    steps.push({
      name: '标记任务完成',
      desc: 'PATCH .../tasks/:id — 将任务状态设为 done（需要有 completed execution）',
      async run(ctx) {
        const body = { status: 'done' };
        const r = await api('PATCH', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}`, body);
        if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('PATCH', `…/tasks/${ctx.taskId}`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        return { state: 'pass', ms: r.ms,
          req: fmtReq('PATCH', `…/tasks/${ctx.taskId}`, r.status, body, `{ status: "done" }`),
          results: [{ label: '任务状态', value: 'done', type: 'ok' }]
        };
      }
    });
  }

  // ── core / full：带 drift 场景 ────────────────────
  if (scenario === 'core' || scenario === 'full') {
    steps.push({
      name: '创建计划 v2（变更范围）',
      desc: 'POST .../plans — 模拟需求变更，新增"移动端 API"要求',
      async run(ctx) {
        const body = { title: '变更计划 v2', goal: '搭建核心 API、基础 UI 及移动端接口', scope: '后端 API + 前端 Dashboard + 移动端 API', deliverables: ['实现登录 API', '完成 Dashboard 首页', '实现移动端鉴权接口'], changeSummary: '新增移动端 API 交付要求' };
        const r = await api('POST', `/api/projects/${ctx.projectId}/plans`, body);
        if (r.status !== 201) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/plans`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        ctx.planV2Id = r.json.data.id;
        return { state: 'pass', ms: r.ms,
          req: fmtReq('POST', `…/plans`, r.status, body, `{ id: "${ctx.planV2Id}", version: 2 }`),
          results: [{ label: '计划 ID', value: ctx.planV2Id, type: 'info' }, { label: '版本', value: 'v2' }]
        };
      }
    });

    steps.push({
      name: '激活计划 v2 → 触发 Drift',
      desc: 'POST .../plans/:id/activate — v2 变为 active，系统自动扫描绑定 v1 的任务并生成 DriftAlert',
      async run(ctx) {
        const r = await api('POST', `/api/projects/${ctx.projectId}/plans/${ctx.planV2Id}/activate`, {});
        if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/plans/${ctx.planV2Id}/activate`, r.status, {}, JSON.stringify(r.json?.error)),
          results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        const driftCount = r.json.data?.driftAlertsCreated ?? '?';
        return { state: 'pass', ms: r.ms,
          req: fmtReq('POST', `…/plans/${ctx.planV2Id}/activate`, r.status, {}, JSON.stringify({ status: 'active', driftAlertsCreated: driftCount })),
          results: [
            { label: '计划状态', value: 'active (v2)', type: 'ok' },
            { label: 'Drift 告警', value: `已创建 ${driftCount} 条`, type: driftCount > 0 ? 'info' : 'err' }
          ]
        };
      }
    });

    steps.push({
      name: '查询 Drift 告警',
      desc: 'GET /api/projects/:id/drifts — 验证告警已创建，获取 driftId 用于后续操作',
      async run(ctx) {
        const r = await api('GET', `/api/projects/${ctx.projectId}/drifts?status=open`);
        if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('GET', `…/drifts?status=open`, r.status, null, JSON.stringify(r.json?.error)),
          results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        const drifts = r.json.data || [];
        if (drifts.length === 0) return { state: 'fail', badge: '无告警', ms: r.ms,
          req: fmtReq('GET', `…/drifts?status=open`, r.status, null, '{ data: [] }'),
          results: [{ label: '问题', value: '应有 1 条 open drift，但列表为空', type: 'err' }]
        };
        ctx.driftId = drifts[0].id;
        return { state: 'pass', ms: r.ms,
          req: fmtReq('GET', `…/drifts?status=open`, r.status, null, JSON.stringify(drifts[0], null, 2).slice(0, 300)),
          results: [
            { label: 'Drift ID', value: ctx.driftId, type: 'info' },
            { label: '严重级别', value: drifts[0].severity },
            { label: '原因', value: drifts[0].reason }
          ]
        };
      }
    });

    steps.push({
      name: '尝试开始执行 → 必须被阻断 ★',
      desc: 'POST .../runs — 存在 open drift 时，系统应拒绝执行（期望 409 DRIFT_UNRESOLVED）',
      async run(ctx) {
        const body = { executorType: 'human', executorName: userName };
        const r = await api('POST', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}/runs`, body);
        if (r.status === 409 && r.json?.error?.code === 'DRIFT_UNRESOLVED') {
          const drifts = r.json.error.details?.drifts || [];
          return { state: 'pass', badge: '409 正确阻断 ★', ms: r.ms,
            req: fmtReq('POST', `…/runs`, r.status, body, JSON.stringify(r.json.error, null, 2)),
            results: [
              { label: '结果', value: '✓ 执行被正确拒绝（DRIFT_UNRESOLVED）', type: 'ok' },
              { label: '告警数', value: `${drifts.length} 条 drift 阻止了执行` },
              { label: '说明', value: 'drift 未解决时系统主动阻断，这是核心护城河' }
            ]
          };
        }
        if (r.status === 201) return { state: 'fail', badge: '❌ 应被阻断', ms: r.ms,
          req: fmtReq('POST', `…/runs`, r.status, body, '执行被允许（错误）'),
          results: [{ label: '严重问题', value: '有 open drift 但执行未被阻断！核心保障失效', type: 'err' }]
        };
        return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/runs`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '期望', value: '409 DRIFT_UNRESOLVED', type: 'err' }, { label: '实际', value: `HTTP ${r.status}: ${r.json?.error?.code}`, type: 'err' }]
        };
      }
    });

    steps.push({
      name: '解决 Drift（no_impact）',
      desc: 'POST /api/projects/:id/drifts/:driftId — 判断变更对本任务无影响，解除阻断',
      async run(ctx) {
        const body = { action: 'no_impact' };
        const r = await api('POST', `/api/projects/${ctx.projectId}/drifts/${ctx.driftId}`, body);
        if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/drifts/${ctx.driftId}`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        return { state: 'pass', ms: r.ms,
          req: fmtReq('POST', `…/drifts/${ctx.driftId}`, r.status, body, `{ status: "resolved", resolvedAction: "no_impact" }`),
          results: [{ label: 'Drift 状态', value: 'resolved (no_impact)', type: 'ok' }]
        };
      }
    });

    steps.push({
      name: '验证 Drift 已清空',
      desc: 'GET .../drifts?status=open — 确认已无 open drift',
      async run(ctx) {
        const r = await api('GET', `/api/projects/${ctx.projectId}/drifts?status=open`);
        if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms, results: [{ label: '错误', value: r.json?.error?.message, type: 'err' }] };
        const drifts = r.json.data || [];
        if (drifts.length > 0) return { state: 'fail', badge: '仍有 drift', ms: r.ms,
          results: [{ label: '问题', value: `仍有 ${drifts.length} 条 open drift，解决未生效`, type: 'err' }]
        };
        return { state: 'pass', ms: r.ms,
          req: fmtReq('GET', `…/drifts?status=open`, r.status, null, '{ data: [] }'),
          results: [{ label: '结果', value: '✓ open drift 已全部清空', type: 'ok' }]
        };
      }
    });

    steps.push({
      name: '再次开始执行 → 必须允许 ★',
      desc: 'POST .../runs — drift 已解决，此时应允许创建执行（期望 201）',
      async run(ctx) {
        const body = { executorType: 'human', executorName: userName };
        const r = await api('POST', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}/runs`, body);
        if (r.status !== 201) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
          req: fmtReq('POST', `…/runs`, r.status, body, JSON.stringify(r.json?.error)),
          results: [{ label: '期望', value: '201', type: 'err' }, { label: '实际', value: '' + r.status, type: 'err' }, { label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
        };
        ctx.runId = r.json.data.id;
        return { state: 'pass', badge: '201 允许继续 ★', ms: r.ms,
          req: fmtReq('POST', `…/runs`, r.status, body, `{ id: "${ctx.runId}", status: "running" }`),
          results: [
            { label: '结果', value: '✓ drift 解决后执行被正确允许', type: 'ok' },
            { label: '执行 ID', value: ctx.runId, type: 'info' }
          ]
        };
      }
    });

    if (scenario === 'core' || scenario === 'full') {
      steps.push({
        name: '完成执行',
        desc: 'POST .../runs/:id?action=complete — 提交交付物，标记执行完成',
        async run(ctx) {
          const body = { status: 'completed', outputSummary: '登录 API 已实现并通过测试', deliverablesMet: ['实现登录 API', '完成 Dashboard 首页'] };
          const r = await api('POST', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}/runs/${ctx.runId}?action=complete`, body);
          if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
            req: fmtReq('POST', `…/runs/${ctx.runId}?action=complete`, r.status, body, JSON.stringify(r.json?.error)),
            results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
          };
          return { state: 'pass', ms: r.ms,
            req: fmtReq('POST', `…/runs/${ctx.runId}?action=complete`, r.status, body, `{ status: "completed" }`),
            results: [{ label: '执行状态', value: 'completed', type: 'ok' }]
          };
        }
      });

      steps.push({
        name: '标记任务完成',
        desc: 'PATCH .../tasks/:id — 完整闭环：任务 → done',
        async run(ctx) {
          const body = { status: 'done' };
          const r = await api('PATCH', `/api/projects/${ctx.projectId}/tasks/${ctx.taskId}`, body);
          if (r.status !== 200) return { state: 'fail', badge: 'HTTP ' + r.status, ms: r.ms,
            req: fmtReq('PATCH', `…/tasks/${ctx.taskId}`, r.status, body, JSON.stringify(r.json?.error)),
            results: [{ label: '错误', value: r.json?.error?.message || r.error, type: 'err' }]
          };
          return { state: 'pass', badge: '全程通过 ✓', ms: r.ms,
            req: fmtReq('PATCH', `…/tasks/${ctx.taskId}`, r.status, body, `{ status: "done" }`),
            results: [{ label: '任务状态', value: 'done', type: 'ok' }, { label: '说明', value: '完整链路验证通过：创建 → drift → 阻断 → 解决 → 执行 → 完成' }]
          };
        }
      });
    }
  }

  return steps;
}

// ─── 启动 ─────────────────────────────────────────────
init();
</script>
</body>
</html>
